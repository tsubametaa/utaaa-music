# Production Configuration for Music Sheet Builder

# Server Configuration
server.port=8080
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# Vaadin Production Mode
vaadin.productionMode=true
vaadin.whitelisted-packages=com.utaaa.music_sheet_builder

# Database Configuration (H2 File-based)
spring.datasource.url=jdbc:h2:file:/app/data/musicsheet
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (disabled in production)
spring.h2.console.enabled=false

# Logging Configuration
logging.level.root=INFO
logging.level.com.utaaa.music_sheet_builder=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Info
spring.application.name=Music Sheet Builder
info.app.name=Music Sheet Builder
info.app.description=Modern web application for creating and managing piano music sheets
info.app.version=1.0.0
