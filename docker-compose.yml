version: "3.8"

services:
  music-sheet-builder:
    build:
      context: .
      dockerfile: Dockerfile
    image: music-sheet-builder:latest
    container_name: music-sheet-builder
    ports:
      - "8080:8080"
    environment:
      # Spring Boot configuration
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080

      # Database configuration (H2 file-based)
      - SPRING_DATASOURCE_URL=jdbc:h2:file:/app/data/musicsheet
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

      # H2 Console (disable in production)
      - SPRING_H2_CONSOLE_ENABLED=false

      # Logging
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_UTAAA=DEBUG

      # JVM Options (dapat di-override)
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC
    volumes:
      # Persist database
      - music-sheet-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - music-sheet-network

volumes:
  music-sheet-data:
    driver: local

networks:
  music-sheet-network:
    driver: bridge
